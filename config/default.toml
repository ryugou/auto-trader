[oanda]
api_url = "https://api-fxpractice.oanda.com"
account_id = ""  # set via OANDA_ACCOUNT_ID env var

[vegapunk]
endpoint = "http://vegapunk.local:6840"
schema = "fx-trading"

[database]
url = "postgresql://auto-trader:auto-trader@localhost:15432/auto_trader"

[monitor]
interval_secs = 60
# backfill_days = 7  # startup時にmax_drawdownを再計算する日数（デフォルト: 7）

[pairs]
fx = ["USD_JPY", "EUR_USD"]
crypto = ["FX_BTC_JPY"]

[bitflyer]
ws_url = "wss://ws.lightstream.bitflyer.com/json-rpc"
api_url = "https://api.bitflyer.com"

[pair_config.FX_BTC_JPY]
price_unit = 1
min_order_size = 0.001

[pair_config.USD_JPY]
price_unit = 0.001
min_order_size = 1

[pair_config.EUR_USD]
price_unit = 0.00001
min_order_size = 1

[position_sizing]
method = "risk_based"
risk_rate = 0.02

[gemini]
model = "gemini-2.5-flash"
api_url = "https://generativelanguage.googleapis.com"

[macro_analyst]
enabled = false
calendar_interval_secs = 3600
news_interval_secs = 1800
news_sources = [
    "https://www.forexlive.com/feed",
    "https://www.dailyfx.com/feeds/market-news",
]

[[strategies]]
name = "swing_llm_v1"
enabled = false
mode = "paper"
pairs = ["USD_JPY", "EUR_USD"]
params = { holding_days_max = 14 }

# === Crypto strategies (2026-04 experiment) ===
# Each runs on its own dedicated 30,000 JPY paper account so the
# experiment is "find what works" — accounts are isolated, blow-ups are
# acceptable, iteration loop fast. See migrations/20260407000005 for the
# full algorithm descriptions.
#
# NOTE on `params`: the new crypto strategies bake their tunables in as
# `const` values inside the Rust source for now. The values listed below
# document the intended tuning for each profile but are NOT consumed at
# runtime — main.rs constructs the strategy structs without forwarding
# `sc.params`. Wiring this through is a follow-up task once we know
# which parameters actually need adjustment from experiment results.

[[strategies]]
name = "bb_mean_revert_v1"
enabled = true
mode = "paper"
pairs = ["FX_BTC_JPY", "USD_JPY"]
# 慎重 (low risk).
params = { bb_period = 20, bb_stddev = 2.5, rsi_period = 14, atr_period = 14 }

[[strategies]]
name = "donchian_trend_v1"
enabled = true
mode = "paper"
pairs = ["FX_BTC_JPY", "USD_JPY"]
# 標準 (medium risk).
params = { entry_channel = 20, exit_channel = 10, atr_period = 14, atr_baseline_bars = 20 }

[[strategies]]
name = "donchian_trend_evolve_v1"
enabled = true
mode = "paper"
pairs = ["FX_BTC_JPY", "USD_JPY"]
# Evolve: Vegapunk 学習ループで週次パラメータ自動更新。
# 実行時パラメータは DB (strategy_params テーブル) から読む。
params = { entry_channel = 20, exit_channel = 10, atr_baseline_bars = 20 }

[[strategies]]
name = "squeeze_momentum_v1"
enabled = true
mode = "paper"
pairs = ["FX_BTC_JPY", "USD_JPY"]
# 攻め (high risk).
params = { bb_period = 20, kc_period = 20, atr_period = 14, ema_trail_period = 21, squeeze_bars = 6 }

# Paper accounts are managed in the database (paper_accounts table).
# Initial accounts are seeded by migration. Use the REST API to manage:
#   GET    /api/paper-accounts
#   POST   /api/paper-accounts
#   GET    /api/paper-accounts/{id}
#   PUT    /api/paper-accounts/{id}
#   DELETE /api/paper-accounts/{id}

# === Risk ===
# 全アカウント共通のガードレール。
[risk]
price_freshness_secs = 60  # price tick がこの秒数より古ければ新規発注禁止

# === Live execution ===
# dry_run が true の間は発注手前で no-op 通知のみ。
# LIVE_DRY_RUN env が設定されていればそちらが優先される。
[live]
enabled = false  # true にしないと live 口座での取引が起動時・runtime 両方で拒否される
dry_run = true
