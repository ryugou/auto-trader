[oanda]
api_url = "https://api-fxpractice.oanda.com"
account_id = ""  # set via OANDA_ACCOUNT_ID env var

[vegapunk]
endpoint = "http://vegapunk.local:6840"
schema = "fx-trading"

[database]
url = "postgresql://auto-trader:auto-trader@localhost:15432/auto_trader"

[monitor]
interval_secs = 60
# backfill_days = 7  # startup時にmax_drawdownを再計算する日数（デフォルト: 7）

[pairs]
fx = ["USD_JPY", "EUR_USD"]
crypto = ["FX_BTC_JPY"]

[bitflyer]
ws_url = "wss://ws.lightstream.bitflyer.com/json-rpc"
api_url = "https://api.bitflyer.com"

[pair_config.FX_BTC_JPY]
price_unit = 1
min_order_size = 0.001

[pair_config.USD_JPY]
price_unit = 0.001
min_order_size = 1

[pair_config.EUR_USD]
price_unit = 0.00001
min_order_size = 1

[exchange_margin.bitflyer_cfd]
# bitFlyer Crypto CFD: 維持率 50% 未満で即時ロスカット (公式)
# https://bitflyer.com/ja-jp/faq/7-23
liquidation_margin_level = 0.50

[exchange_margin.gmo_fx]
# GMOコイン外国為替FX: 維持率 100% 未満でロスカット (公式)
# https://support.coin.z.com/hc/ja/articles/17884183390105
liquidation_margin_level = 1.00

[exchange_margin.oanda]
# OANDA Japan FX: 維持率 100% 未満でロスカット (公式)
# https://www.oanda.jp/lab-education/start_lecture/margin_management/
# 現時点で OANDA accounts は運用しておらず、`Exchange::Oanda` enum と
# `[oanda]` セクションは残置されているのみ。OANDA を有効化したい場合は
# trading_accounts に行を作る前にこの値を出典付きで再確認すること。
liquidation_margin_level = 1.00

[position_sizing]
method = "risk_based"
risk_rate = 0.02

[gemini]
model = "gemini-2.5-flash"
api_url = "https://generativelanguage.googleapis.com"

[macro_analyst]
# Macro analyst ingests external news/economic-calendar into the KnowledgeStore
# so weekly evolution + LLM-driven strategies have richer context. Disabled in
# the initial deployment; turned on once Vegapunk wiring stabilized (PR #84).
enabled = true
calendar_interval_secs = 3600
news_interval_secs = 1800
# DailyFX (`www.dailyfx.com/feeds/market-news`) currently returns HTTP 403 to
# unauthenticated user agents — removed until we either add an API key or
# switch to a feed that's actually scrapeable. ForexLive's feed works (301
# redirect → valid RSS).
news_sources = [
    "https://www.forexlive.com/feed",
]

[[strategies]]
name = "swing_llm_v1"
enabled = false
mode = "paper"
pairs = ["USD_JPY", "EUR_USD"]
params = { holding_days_max = 14 }

# === Strategy registration ===
# Each [[strategies]] entry registers a strategy with the engine.
# `pairs` controls which price events the strategy processes.
# `mode` controls the engine slot (paper/disabled).
#
# Parameter source of truth (SoT):
#   - bb_mean_revert_v1, donchian_trend_v1, squeeze_momentum_v1:
#     Rust const in crates/strategy/src/*.rs (hardcoded, tuned experimentally)
#   - donchian_trend_evolve_v1:
#     DB strategy_params table (updated weekly by vegapunk batch)
#   - swing_llm_v1:
#     TOML params below (holding_days_max consumed at registration)
#
# Do NOT add `params` to strategies that use Rust const — it creates a
# false impression that TOML values are consumed. If you need to tune,
# change the const in the Rust source and rebuild.

[[strategies]]
name = "bb_mean_revert_v1"
enabled = true
mode = "paper"
pairs = ["FX_BTC_JPY", "USD_JPY"]

[[strategies]]
name = "donchian_trend_v1"
enabled = true
mode = "paper"
pairs = ["FX_BTC_JPY", "USD_JPY"]

[[strategies]]
name = "donchian_trend_evolve_v1"
enabled = true
mode = "paper"
pairs = ["FX_BTC_JPY", "USD_JPY"]

[[strategies]]
name = "squeeze_momentum_v1"
enabled = true
mode = "paper"
pairs = ["FX_BTC_JPY", "USD_JPY"]

# Trading accounts are managed in the database (trading_accounts table).
# Initial accounts are seeded by migration. Use the REST API to manage:
#   GET    /api/trading-accounts
#   POST   /api/trading-accounts
#   GET    /api/trading-accounts/{id}
#   PUT    /api/trading-accounts/{id}
#   DELETE /api/trading-accounts/{id}

# === Risk ===
# 全アカウント共通のガードレール。
[risk]
price_freshness_secs = 60  # price tick がこの秒数より古ければ新規発注禁止

# === Live execution ===
# dry_run が true の間は発注手前で no-op 通知のみ。
# LIVE_DRY_RUN env が設定されていればそちらが優先される。
[live]
enabled = false  # true にしないと live 口座での取引が起動時・runtime 両方で拒否される
dry_run = true
