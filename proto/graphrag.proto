syntax = "proto3";
package graphrag;

service GraphRAGEngine {
  // High-level API
  rpc Ingest(IngestRequest) returns (IngestResponse);
  rpc Search(SearchRequest) returns (SearchResponse);

  // Low-level API
  rpc UpsertNodes(UpsertNodesRequest) returns (UpsertNodesResponse);
  rpc UpsertEdges(UpsertEdgesRequest) returns (UpsertEdgesResponse);
  rpc UpsertVectors(UpsertVectorsRequest) returns (UpsertVectorsResponse);

  // Admin (Phase 1b - returns UNIMPLEMENTED in 1a)
  rpc Merge(MergeRequest) returns (MergeResponse);
  rpc Rebuild(RebuildRequest) returns (RebuildResponse);
  rpc Backup(BackupRequest) returns (BackupResponse);
  rpc Migrate(MigrateRequest) returns (MigrateResponse);

  // Feedback (Phase 2a)
  rpc Feedback(FeedbackRequest) returns (FeedbackResponse);

  // Matching review (Phase 2b)
  rpc GetNeedsReview(GetNeedsReviewRequest) returns (GetNeedsReviewResponse);
  rpc ResolveMatch(ResolveMatchRequest) returns (ResolveMatchResponse);

  // Job status (Phase 2c)
  rpc GetJobStatus(GetJobStatusRequest) returns (GetJobStatusResponse);

  // Raw text ingestion (Phase 2c)
  rpc IngestRaw(IngestRawRequest) returns (IngestRawResponse);

  // File-based ingestion (Phase 2c)
  rpc IngestFile(IngestFileRequest) returns (IngestFileResponse);

  // Schema lifecycle (Phase 2c)
  rpc DeleteSchema(DeleteSchemaRequest) returns (DeleteSchemaResponse);
  rpc Reingest(ReingestRequest) returns (ReingestResponse);

  // Prompt improvement (Phase 3)
  rpc ImprovePrompts(ImprovePromptsRequest) returns (ImprovePromptsResponse);
}

// ── Ingest ────────────────────────────────────────────────────────────────

message MessageMetadata {
  string source_type = 1;
  string author = 2;
  optional string author_id = 3;
  string channel = 4;
  optional string channel_id = 5;
  optional string thread_id = 6;
  string timestamp = 7;  // RFC3339 format required (e.g. "2026-03-01T10:00:00+09:00")
}

message IngestMessage {
  optional string id = 1;
  string text = 2;
  MessageMetadata metadata = 3;
}

message IngestRequest {
  repeated IngestMessage messages = 1;
  optional string schema = 2;  // Schema name (default: config default)
}

message IngestResponse {
  int32 ingested_count = 1;
  optional string job_id = 2;
}

// ── Search ────────────────────────────────────────────────────────────────

message SearchFilter {
  optional string after = 1;   // RFC3339 format required
  optional string before = 2;  // RFC3339 format required
  optional string source_type = 3;
}

message SearchRequest {
  string text = 1;
  optional SearchFilter filter = 2;
  optional int32 depth = 3;
  optional int32 top_k = 4;
  optional string format = 5;
  optional string mode = 6;  // "local" | "global" | "hybrid". Default: "local"
  optional string schema = 7;  // Schema name (default: config default)
  // Paging: offset + limit enables result pagination.
  // Internally fetches max(top_k, offset+limit) results, so large offsets
  // increase retrieval cost. Use top_k/max_top_k config to bound this.
  optional int32 offset = 8;  // Paging offset (default 0)
  optional int32 limit = 9;   // Paging limit (default = top_k)
  // Weight for structural (Node2Vec) scores in search ranking.
  // 0.0 = text-only (default behavior), 1.0 = structural-only. Default: config value (0.3).
  // When > 0, SearchResultItem.score becomes a normalized blend (0-1 scale)
  // rather than raw text similarity. Use for ordering only.
  optional float structural_weight = 10;
}

message SearchResultItem {
  string type = 1;
  optional string id = 2;
  optional string text = 3;
  // Score: similarity ranking value. When structural_weight > 0, this is a
  // normalized blend of text and structural similarity (0-1 scale, not raw
  // embedding distance). Use for ordering only, not as absolute similarity.
  optional float score = 4;
  optional string person = 5;
  optional string timestamp = 6;
  optional string summary = 7;
  optional string channel = 8;
  optional string decided_at = 9;
  repeated string rationales = 10;
}

message SimilarPattern {
  string source_project = 1;                // Detected source project (channel)
  repeated SearchResultItem nodes = 2;      // Decision + Rationale set
  float structural_similarity = 3;          // Structural similarity score
}

message SearchResponse {
  repeated SearchResultItem results = 1;
  string search_id = 2;
  int32 total_count = 3;  // Total count before offset/limit slicing
  repeated SimilarPattern similar_patterns = 4;  // Phase 3: cross-project pattern detection
}

// ── Feedback ──────────────────────────────────────────────────────────────

message FeedbackRequest {
  string search_id = 1;
  int32 rating = 2;       // 1-5 scale (1=lowest, 5=highest)
  string comment = 3;     // optional
}

message FeedbackResponse {}

// ── Low-level API ─────────────────────────────────────────────────────────

message NodeAttribute {
  string key = 1;
  string value = 2;
}

message Node {
  string id = 1;
  string type = 2;
  repeated NodeAttribute attributes = 3;
}

message UpsertNodesRequest {
  repeated Node nodes = 1;
}

message UpsertNodesResponse {
  int32 upserted_count = 1;
}

message Edge {
  string from_id = 1;
  string to_id = 2;
  string type = 3;
  repeated NodeAttribute attributes = 4;
}

message UpsertEdgesRequest {
  repeated Edge edges = 1;
}

message UpsertEdgesResponse {
  int32 upserted_count = 1;
}

message VectorEntry {
  string id = 1;
  repeated float vector = 2;
  map<string, string> metadata = 3;
}

message UpsertVectorsRequest {
  repeated VectorEntry vectors = 1;
}

message UpsertVectorsResponse {
  int32 upserted_count = 1;
}

// ── Admin (Phase 1b stubs) ────────────────────────────────────────────────

message MergeRequest {
  optional string schema = 1;  // Schema name (default: config default)
}
message MergeResponse {}
message RebuildRequest {}
message RebuildResponse {}
message BackupRequest { string output_path = 1; }
message BackupResponse {}
message MigrateRequest { string schema = 1; bool dry_run = 2; }
message MigrateResponse {}

// ── Matching review (Phase 2b) ───────────────────────────────────────────

message GetNeedsReviewRequest {
  optional string schema = 1;
  optional string node_type = 2;
}

message NeedsReviewItem {
  string node_id = 1;
  string node_type = 2;
  string name = 3;
  repeated string candidates = 4;
}

message GetNeedsReviewResponse {
  repeated NeedsReviewItem items = 1;
}

message ResolveMatchRequest {
  string node_id = 1;
  optional string match_to = 2;  // If empty/absent, mark as "no match" (new entity)
}

message ResolveMatchResponse {}

// ── Job status (Phase 2c) ───────────────────────────────────────────────

message GetJobStatusRequest {
  string msg_id = 1;
}

message JobStatusItem {
  string job_type = 1;
  string status = 2;
  optional string error = 3;
  optional string created_at = 4;
  optional string completed_at = 5;
}

message GetJobStatusResponse {
  string msg_id = 1;
  repeated JobStatusItem jobs = 2;
  string overall_status = 3;  // "pending" | "processing" | "completed" | "failed"
}

// ── IngestRaw (Phase 2c) ───────────────────────────────────────────────

message IngestRawMetadata {
  string source_type = 1;
  optional string author = 2;
  optional string channel = 3;
  optional string timestamp = 4;   // RFC3339. If omitted, use server time
}

message IngestRawRequest {
  string text = 1;
  IngestRawMetadata metadata = 2;
  optional string schema = 3;
}

message IngestRawResponse {
  int32 chunk_count = 1;
  repeated string msg_ids = 2;
}

// ── IngestFile (Phase 2c) ──────────────────────────────────────────────
//
// Fully async: returns job_id immediately. Use GetJobStatus with the
// returned job_id to track the ingest_file job progress. Once the
// ingest_file job completes, each chunk gets its own msg_id with
// entity_extraction jobs — those can also be tracked via GetJobStatus.
// Supported formats: txt, md, html/htm. PDF is planned for a future release.

message IngestFileRequest {
  string file_path = 1;           // Server-local file path
  optional string schema = 2;
  optional IngestRawMetadata metadata = 3;
}

message IngestFileResponse {
  string job_id = 1;              // Use with GetJobStatus to track progress
}

// ── DeleteSchema + Reingest (Phase 2c) ───────────────────────────────────

message DeleteSchemaRequest {
  string schema = 1;
  bool confirm = 2;   // false = dry run (show impact only)
}

message DeleteSchemaResponse {
  int32 deleted_nodes = 1;
  int32 deleted_edges = 2;
  int32 deleted_vectors = 3;
  int32 deleted_cross_schema_edges = 4;
  bool dry_run = 5;
}

message ReingestRequest {
  string schema = 1;
}

message ReingestResponse {
  int32 message_count = 1;
}

// ── ImprovePrompts (Phase 3) ───────────────────────────────────────────

message ImprovePromptsRequest {
  bool dry_run = 1;   // If true, only analyze without applying changes
}

message ImprovePromptsResponse {
  bool applied = 1;                   // Whether improvements were actually applied
  int32 feedback_count = 2;           // Number of feedback entries analyzed
  string reason = 3;                  // Explanation (e.g., "threshold not met", "applied 2 improvements")
}
